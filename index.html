      // Pairs with public/404.html: decodes the `?/path&query` blob back into

      // original URL (including the OAuth `?code=` on /callback).
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');

          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
